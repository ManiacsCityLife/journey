name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Java 21 # Updated to Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor (Update Android project)
        run: npx cap sync android

      - name: Copy icons (as per actual directory structure)
        run: |
          cp -r android-icons/mipmap-mdpi android/app/src/main/res/ || true
          cp -r android-icons/mipmap-hdpi android/app/src/main/res/ || true
          cp -r android-icons/mipmap-xhdpi android/app/src/main/res/ || true
          cp -r android-icons/mipmap-xxhdpi android/app/src/main/res/ || true
          cp -r android-icons/mipmap-xxxhdpi android/app/src/main/res/ || true

      - name: Remove invalid Capacitor icon filenames
        run: find android/app/src/main/res -name "icon-only.png" -delete

      - name: Build Android debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
